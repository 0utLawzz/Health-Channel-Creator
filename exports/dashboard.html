<style>
  :root {
    --black: #111111;
    --bg: #F8F4E8;
    --bg-alt: #EEE4CC;
    --panel: #FFFDF7;
    --accent: #D9481C;
    --success: #00A878;
    --success-dark: #176B4D;
    --warning: #F4B400;
    --info: #2C8FFF;
    --published: #7B3FE4;
    --border: #111111;
    --text: #111111;
    --text-muted: #555555;
    --radius-sm: 6px;
    --radius: 6px;
    --shadow: 5px 5px 0 #111111;
    --shadow-hover: 7px 7px 0 #111111;
    --shadow-sm: 3px 3px 0 #111111;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Manrope', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== NAVBAR ===== */
  .navbar {
    background: var(--black);
    padding: 16px 24px;
    border-bottom: 4px solid var(--black);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .navbar-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .brand {
    font-family: 'Anton', sans-serif;
    font-size: 28px;
    color: var(--panel);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .brand span {
    color: var(--accent);
  }
  .nav-stats {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .nav-stat {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    background: var(--panel);
    color: var(--black);
    padding: 6px 12px;
    border: 3px solid var(--black);
    border-radius: var(--radius-sm);
  }

  /* ===== FILTERS ===== */
  .filters-bar {
    max-width: 1400px;
    margin: 24px auto 16px;
    padding: 0 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-btn {
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 8px 16px;
    border: 3px solid var(--black);
    border-radius: var(--radius);
    background: var(--panel);
    color: var(--black);
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .filter-btn:hover {
    transform: translate(-2px, -2px);
    box-shadow: var(--shadow);
  }
  .filter-btn:active {
    transform: translate(2px, 2px);
    box-shadow: none;
  }
  .filter-btn.active {
    background: var(--black);
    color: var(--panel);
  }

  /* ===== GRID ===== */
  .grid {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px 64px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 24px;
  }

  /* ===== CARD ===== */
  .card {
    background: var(--panel);
    border: 4px solid var(--black);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    transform: translate(-3px, -3px);
    box-shadow: var(--shadow-hover);
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--bg-alt);
    border-bottom: 3px solid var(--black);
  }
  .card-ep {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Status badges */
  .badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 10px;
    border: 2px solid var(--black);
    border-radius: var(--radius-sm);
  }
  .badge.complete {
    background: var(--success);
    color: white;
    border-color: var(--success-dark);
  }
  .badge.built {
    background: var(--warning);
    color: var(--black);
    border-color: var(--black);
  }
  .badge.queued {
    background: var(--bg-alt);
    color: var(--text-muted);
    border-color: var(--black);
  }
  .badge.published {
    background: var(--published);
    color: white;
    border-color: var(--black);
  }

  /* Video / thumbnail area */
  .thumb-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 9 / 16;
    background: var(--black);
    border-bottom: 3px solid var(--black);
    overflow: hidden;
  }
  .thumb-wrap video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .thumb-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .thumb-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 13px;
    text-align: center;
    gap: 8px;
    padding: 16px;
  }
  .thumb-placeholder svg {
    opacity: 0.4;
  }

  /* Play overlay */
  .play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.3);
    opacity: 0;
    transition: opacity 0.2s;
    cursor: pointer;
  }
  .thumb-wrap:hover .play-overlay {
    opacity: 1;
  }
  .play-icon {
    width: 56px;
    height: 56px;
    background: var(--panel);
    border: 3px solid var(--black);
    border-radius: 50%;
    box-shadow: var(--shadow-sm);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .play-icon::after {
    content: '';
    width: 0;
    height: 0;
    border-left: 18px solid var(--black);
    border-top: 10px solid transparent;
    border-bottom: 10px solid transparent;
    margin-left: 4px;
  }

  /* Card body */
  .card-body {
    padding: 14px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card-title {
    font-family: 'Anton', sans-serif;
    font-size: 20px;
    line-height: 1.2;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--black);
  }
  .card-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  /* Copy section */
  .copy-section {
    margin-top: 4px;
    padding-top: 10px;
    border-top: 2px dashed var(--bg-alt);
  }
  .copy-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .copy-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .copy-btn {
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 6px 10px;
    border: 2px solid var(--black);
    border-radius: var(--radius-sm);
    background: var(--panel);
    color: var(--black);
    cursor: pointer;
    box-shadow: 2px 2px 0 var(--black);
    transition: transform 0.08s, box-shadow 0.08s;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .copy-btn:hover {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--black);
  }
  .copy-btn:active {
    transform: translate(1px, 1px);
    box-shadow: none;
  }
  .copy-btn.copied {
    background: var(--success);
    color: white;
    border-color: var(--success-dark);
    box-shadow: 2px 2px 0 var(--success-dark);
  }
  .copy-btn svg {
    width: 12px;
    height: 12px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--black);
    color: var(--panel);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 12px 18px;
    border: 3px solid var(--black);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    z-index: 200;
    transform: translateY(120px);
    transition: transform 0.3s ease;
  }
  .toast.show {
    transform: translateY(0);
  }

  /* Empty state */
  .empty-state {
    max-width: 1400px;
    margin: 48px auto;
    padding: 0 24px;
    text-align: center;
  }
  .empty-state h3 {
    font-family: 'Anton', sans-serif;
    font-size: 32px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .empty-state p {
    color: var(--text-muted);
    font-size: 14px;
  }

  @media (max-width: 640px) {
    .grid {
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 0 12px 32px;
    }
    .navbar-inner {
      flex-direction: column;
      align-items: flex-start;
    }
    .card-title { font-size: 16px; }
  }
</style>
</head>

// ===== UTILS =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

async function copyText(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    const original = btn.textContent;
    btn.classList.add('copied');
    btn.textContent = 'Copied!';
    showToast('Copied to clipboard!');
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.textContent = original;
    }, 1500);
  } catch (e) {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied!');
  }
}

function getStatusClass(status) {
  if (status === 'Complete') return 'complete';
  if (status === 'Built') return 'built';
  if (status === 'Published') return 'published';
  return 'queued';
}

function hasVideo(ep) {
  return ep.status === 'Complete' || ep.status === 'Built' || ep.status === 'Published';
}

// ===== RENDER =====
function renderGrid(filter) {
  const grid = document.getElementById('grid');
  const filtered = filter === 'all' ? EPISODES : EPISODES.filter(e => e.status === filter);

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1;">
        <h3>No episodes found</h3>
        <p>Try a different filter.</p>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map(ep => {
    const thumb = hasVideo(ep)
      ? `<video class="thumb" poster="${ep.folder}/thumbnail.png" controls preload="none" onplay="this.closest('.thumb-wrap').querySelector('.play-overlay').style.display='none'">
           <source src="${ep.folder}/episode.mp4" type="video/mp4">
         </video>
         <div class="play-overlay" onclick="this.previousElementSibling.play();this.style.display='none'">
           <div class="play-icon"></div>
         </div>`
      : `<div class="thumb-placeholder">
           <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
             <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
             <line x1="12" y1="8" x2="12" y2="16"/>
             <line x1="8" y1="12" x2="16" y2="12"/>
           </svg>
           Not produced yet
         </div>`;

    const copySection = hasVideo(ep) ? `
      <div class="copy-section">
        <div class="copy-label">Copy for YouTube</div>
        <div class="copy-row">
          <button class="copy-btn" onclick="copyText('${escapeJS(ep.title)}', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Title
          </button>
          <button class="copy-btn" onclick="copyText('${escapeJS(ep.desc + ' ' + ep.hashtags)}', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Description
          </button>
          <button class="copy-btn" onclick="copyText('${escapeJS(ep.hashtags)}', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Hashtags
          </button>
          <button class="copy-btn" onclick="copyText('${escapeJS(ep.cta)}', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            CTA
          </button>
        </div>
      </div>` : '';

    return `
      <div class="card" data-status="${ep.status}">
        <div class="card-header">
          <span class="card-ep">EP ${ep.num}</span>
          <span class="badge ${getStatusClass(ep.status)}">${ep.status}</span>
        </div>
        <div class="thumb-wrap">
          ${thumb}
        </div>
        <div class="card-body">
          <div class="card-title">${ep.title}</div>
          <div class="card-meta">${ep.date} · ${ep.duration}</div>
          ${copySection}
        </div>
      </div>`;
  }).join('');
}

function escapeJS(str) {
  return str.replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/\n/g, ' ');
}

function filterCards(status, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid(status);
}

// Init
renderGrid('all');
